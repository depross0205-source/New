<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>矛與盾 V7.0 — 數據整合回測引擎</title>
<style>
/* ── 延續 V6.0 字型與色彩 ── */
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;600;700;900&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}
:root{
--bg:#0a0c10; --surface:#12161f; --surface2:#1a2030; --border:#252d3d;
--border-hi:#3a4560; --text:#e2eaf8; --muted:#6b7a99; --dim:#3d4a66;
--green:#00e5a0; --green-dim:#003d2a; --red:#ff4d6d; --red-dim:#3d0012;
--yellow:#ffb830; --yellow-dim:#3d2900; --blue:#4d9fff; --blue-dim:#001a3d;
--accent:#7eb8ff; --gold:#ffd166; --white:#f8faff;
}

body{
font-family:'IBM Plex Sans',sans-serif; background:var(--bg); color:var(--text);
min-height:100vh; padding:24px 20px; line-height:1.6;
}
.mono{font-family:'IBM Plex Mono',monospace;}
.wrap{max-width:1100px;margin:0 auto;}

/* ── Header ── */
.hdr{
display:flex;justify-content:space-between;align-items:center;
border-bottom:2px solid var(--border-hi); padding-bottom:18px;margin-bottom:24px;
}
.hdr-title{font-size:22px;font-weight:900;color:var(--white);display:flex;align-items:center;gap:10px;}
.hdr-title span.v{font-size:12px;font-weight:600;background:var(--green);color:#000;padding:2px 8px;border-radius:3px;}
.hdr-sub{font-size:13px;color:var(--muted);margin-top:4px;}

/* ── 手動更新列 ── */
.data-bar{
display:flex;align-items:center;gap:12px;flex-wrap:wrap;
background:var(--surface);border:1px solid var(--border);
padding:12px 16px;margin-bottom:20px; font-size:13px;
}
.data-bar .input-group{display:flex;align-items:center;gap:6px;background:var(--bg);padding:4px 10px;border:1px solid var(--border-hi);}
.data-bar label{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;}
.data-bar input{background:transparent;border:none;color:var(--white);font-family:'IBM Plex Mono';width:60px;font-weight:700;outline:none;}

/* ── Tabs ── */
.tabs{display:flex;gap:0;margin-bottom:24px;border-bottom:2px solid var(--border);}
.tab{
padding:10px 22px;font-size:14px;font-weight:600;cursor:pointer;color:var(--muted);
border:none;border-bottom:3px solid transparent;background:none;transition:0.15s;
}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.panel{display:none;}.panel.active{display:block;}

/* ── Config ── */
.cfg-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:18px;}
@media(max-width:700px){.cfg-grid{grid-template-columns:1fr;}}
.cfg-box{background:var(--surface);border:1px solid var(--border);padding:18px;}
.cfg-box h5{font-size:11px;letter-spacing:2px;color:var(--muted);font-weight:700;margin-bottom:14px;border-bottom:1px solid var(--border);padding-bottom:8px;text-transform:uppercase;}

.f{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px;}
.f label{color:var(--text);font-size:14px;}
.f input, .f select{background:var(--bg);border:1px solid var(--border-hi);color:var(--white);font-family:'IBM Plex Mono';font-size:14px;padding:6px;text-align:right;}

/* ── Upload Box ── */
.upload-box{
background:var(--surface2);border:2px dashed var(--border-hi);padding:20px;text-align:center;margin-bottom:18px;transition:0.2s;
}
.upload-box:hover{border-color:var(--accent);}
.upload-box label{cursor:pointer;color:var(--accent);font-weight:700;}
input[type="file"]{display:none;}

.btn{padding:12px 28px;font-weight:700;cursor:pointer;border:2px solid;transition:0.15s;font-family:inherit;}
.btn-primary{background:var(--green);color:#000;border-color:var(--green);}
.btn-primary:hover{background:#00ffb3;}
.btn-update{background:transparent;color:var(--yellow);border-color:var(--yellow);padding:8px 16px;font-size:13px;}

/* ── 儀表板組件 ── */
.live-bar{background:var(--surface);border:1px solid var(--border-hi);padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.live-bar .item{display:flex;flex-direction:column;}
.live-bar .item .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;}
.live-bar .item .val{font-size:26px;font-weight:900;font-family:'IBM Plex Mono';}
.live-bar .sep{width:1px;height:40px;background:var(--border);}

.kpi-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px;}
.kpi{background:var(--surface);border:1px solid var(--border);padding:16px;}
.kpi-label{font-size:11px;color:var(--muted);margin-bottom:6px;}
.kpi-val{font-size:24px;font-weight:900;font-family:'IBM Plex Mono';}

.chart-wrap{background:var(--surface);border:1px solid var(--border);padding:18px;margin-bottom:16px;}
.table-wrap{background:var(--surface);border:1px solid var(--border);overflow-x:auto;margin-bottom:16px;}
table{width:100%;border-collapse:collapse;font-size:14px;}
th{padding:10px;color:var(--muted);text-align:left;background:var(--surface2);}
td{padding:10px;border-bottom:1px solid var(--border);}
.tg{color:var(--green);font-weight:700;}.tr{color:var(--red);font-weight:700;}

/* Loading */
.loading-overlay{position:fixed;inset:0;background:rgba(10,12,16,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px;}
.hidden{display:none;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="loading-overlay hidden" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">計算中...</div>
</div>

<div class="wrap">

  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-title">🛡️ 矛與盾 <span class="v">V7.0 PRO-C</span></div>
      <div class="hdr-sub">資料整併回測引擎 ｜ 支援 CSV 上傳與即時手動更新</div>
    </div>
    <div id="dataSourceBadge" style="font-size:12px;padding:4px 12px;border:1px solid var(--border-hi);color:var(--muted);font-family:monospace;">● 初始數據模式</div>
  </div>

  <div class="data-bar">
    <span class="mono" style="color:var(--yellow);font-weight:700;">今日觀測：</span>
    <div class="input-group"><label>HY OAS %</label><input type="number" id="mHY" value="3.1" step="0.01"></div>
    <div class="input-group"><label>TIPS 10Y %</label><input type="number" id="mTIPS" value="1.9" step="0.01"></div>
    <div class="input-group"><label>VIX</label><input type="number" id="mVIX" value="18.0" step="0.1"></div>
    <button class="btn btn-update mono" onclick="applyManualData()">⚡ 立即更新當前分數</button>
    <div style="font-size:11px;color:var(--dim);margin-left:auto;">*更新將覆寫回測最後一日數據</div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab(event,'config')">⚙ 設定與上傳</button>
    <button class="tab" onclick="switchTab(event,'result')">📊 回測報告</button>
    <button class="tab" onclick="switchTab(event,'yearly')">📅 逐年績效</button>
    <button class="tab" onclick="switchTab(event,'trades')">📋 換檔紀錄</button>
  </div>

  <div class="panel active" id="panel-config">
    
    <div class="upload-box">
      <p style="margin-bottom:10px;">📤 <b>上傳整合資料庫</b></p>
      <p style="font-size:12px;color:var(--muted);margin-bottom:15px;">請選擇 Shield_Merged_Database.csv (欄位: Date, SP500, HY_Spread, TIPS_10Y, VIX, CAPE)</p>
      <label for="csvUpload">點擊選擇檔案 或 拖曳至此</label>
      <input type="file" id="csvUpload" accept=".csv" onchange="handleFileUpload(event)">
      <div id="fileNameDisplay" style="margin-top:10px;font-size:12px;color:var(--green);"></div>
    </div>

    <div class="cfg-grid">
      <div class="cfg-box">
        <h5>策略參數 <span class="mono">STRATEGY</span></h5>
        <div class="f"><label>加碼門檻 (≥)</label><input type="number" id="cfgS150" value="60"></div>
        <div class="f"><label>標準門檻 (≥)</label><input type="number" id="cfgS100" value="40"></div>
        <div class="f"><label>VIX 觸發</label><input type="number" id="cfgVix" value="35"></div>
      </div>
      <div class="cfg-box">
        <h5>回測期間 <span class="mono">PERIOD</span></h5>
        <div class="f"><label>起始年份</label>
          <select id="cfgStart"><option value="2016">2016 (檔案起始)</option><option value="2020">2020</option></select>
        </div>
        <div class="f"><label>初始資金</label><input type="number" id="cfgCap" value="100000"></div>
        <div class="f"><label>交易成本(bp)</label><input type="number" id="cfgCost" value="5"></div>
      </div>
      <div class="cfg-box">
        <h5>方法 B 參數 <span class="mono">Z-SCORE</span></h5>
        <div class="f"><label>Z-Score 閥值</label><input type="number" id="cfgHyZ" value="1.5" step="0.1"></div>
        <div class="f"><label>窗口(月)</label><input type="number" value="24" disabled style="opacity:0.5"></div>
      </div>
    </div>

    <button class="btn btn-primary" style="width:100%" onclick="runBacktest()">▶ 執行完整歷史回測</button>
  </div>

  <div class="panel" id="panel-result">
    <div class="live-bar" id="liveShieldBox"></div>
    <div class="kpi-strip" id="kpiStrip"></div>
    <div class="chart-wrap"><canvas id="navChart" height="300"></canvas></div>
    <div class="chart-wrap"><canvas id="ddChart" height="150"></canvas></div>
  </div>

  <div class="panel" id="panel-yearly">
    <div class="table-wrap">
      <table><thead><tr><th>年份</th><th>策略報酬</th><th>B&H</th><th>Alpha</th><th>MDD</th><th>換檔次</th></tr></thead>
      <tbody id="yrBody"></tbody></table>
    </div>
  </div>

  <div class="panel" id="panel-trades">
    <div class="table-wrap" style="max-height:600px;overflow-y:auto;">
      <table><thead><tr><th>日期</th><th>齒輪</th><th>倉位</th><th>盾牌</th><th>Z-Score</th><th>VIX</th><th>SP500</th></tr></thead>
      <tbody id="trBody"></tbody></table>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════════
// 1. 全域變數與預設數據 (V6版備份數據)
// ═══════════════════════════════════════════
let DATES = [], SP = [], HY = [], TIPS = [], VIX = [], CAPE = [];
let BT_RESULT = null;

// 預設虛擬數據 (防止未上傳前報錯)
function initEmptyData() {
  const now = new Date();
  for(let i=0; i<500; i++) {
    const d = new Date(now); d.setDate(d.getDate()-i);
    DATES.unshift(d.toISOString().slice(0,10));
    SP.unshift(4000 + i*2); HY.unshift(3.5); TIPS.unshift(1.5); VIX.unshift(18); CAPE.unshift(30);
  }
}
initEmptyData();

// ═══════════════════════════════════════════
// 2. CSV 上傳處理 (以您提供的欄位抓取)
// ═══════════════════════════════════════════
function handleFileUpload(event) {
  const file = event.target.files[0];
  if(!file) return;
  
  document.getElementById('fileNameDisplay').textContent = "正在讀取: " + file.name;
  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;
    const lines = text.split('\n').filter(l => l.trim().length > 0);
    const headers = lines[0].split(',').map(h => h.trim());
    
    // 欄位索引對應
    const idx = {
      date: headers.indexOf('Date'),
      sp: headers.indexOf('SP500'),
      hy: headers.indexOf('HY_Spread'),
      tips: headers.indexOf('TIPS_10Y'),
      vix: headers.indexOf('VIX'),
      cape: headers.indexOf('CAPE')
    };

    // 清空舊數據
    DATES = []; SP = []; HY = []; TIPS = []; VIX = []; CAPE = [];
    
    for(let i=1; i<lines.length; i++) {
      const col = lines[i].split(',');
      if(col.length < 5) continue;
      
      DATES.push(col[idx.date]);
      SP.push(parseFloat(col[idx.sp]));
      HY.push(parseFloat(col[idx.hy]));
      TIPS.push(parseFloat(col[idx.tips]));
      VIX.push(parseFloat(col[idx.vix]));
      CAPE.push(parseFloat(col[idx.cape]) || 30);
    }
    
    // Forward Fill 處理 NaN
    fillNaN(HY); fillNaN(TIPS); fillNaN(VIX); fillNaN(SP);
    
    document.getElementById('dataSourceBadge').textContent = '● 已載入自定義 CSV (' + DATES.length + ' 筆)';
    document.getElementById('dataSourceBadge').style.color = 'var(--green)';
    alert("上傳成功！已載入 " + DATES.length + " 天數據。");
  };
  reader.readAsText(file);
}

function fillNaN(arr) {
  let last = arr.find(v => !isNaN(v)) || 0;
  for(let i=0; i<arr.length; i++) {
    if(isNaN(arr[i])) arr[i] = last;
    else last = arr[i];
  }
}

// ═══════════════════════════════════════════
// 3. 手動更新機制
// ═══════════════════════════════════════════
function applyManualData() {
  const lastIdx = DATES.length - 1;
  HY[lastIdx] = parseFloat(document.getElementById('mHY').value);
  TIPS[lastIdx] = parseFloat(document.getElementById('mTIPS').value);
  VIX[lastIdx] = parseFloat(document.getElementById('mVIX').value);
  
  runBacktest();
  alert("已更新最後一日觀測數據，盾牌分數已重新計算。");
}

// ═══════════════════════════════════════════
// 4. 回測核心邏輯 (與 V6 完全一致)
// ═══════════════════════════════════════════
function runBacktest() {
  const cfg = {
    s150: parseInt(document.getElementById('cfgS150').value),
    s100: parseInt(document.getElementById('cfgS100').value),
    vix:  parseFloat(document.getElementById('cfgVix').value),
    hyZ:  parseFloat(document.getElementById('cfgHyZ').value),
    cap:  parseFloat(document.getElementById('cfgCap').value),
    cost: parseFloat(document.getElementById('cfgCost').value) / 10000
  };

  showLoading(true);
  
  setTimeout(() => {
    let eq = cfg.cap, bh = cfg.cap;
    let mode = 'NORMAL', lastPos = 1.0, switches = 0;
    const curve = [], tradeLog = [], yrData = {};

    for(let i=1; i < DATES.length; i++) {
      const spRet = (SP[i] - SP[i-1]) / SP[i-1];
      
      // 計算盾牌分數
      const res = computeShield(i, cfg);
      const next = nextMode(mode, res.shield, VIX[i], VIX[i-1], cfg);
      
      const pos = next.pos;
      if(pos !== lastPos) {
        switches++;
        tradeLog.push({ d:DATES[i], mode:next.mode, pos, shield:res.shield, z:res.z, vix:VIX[i], sp:SP[i] });
      }
      
      const cost = (pos !== lastPos) ? cfg.cost : 0;
      eq *= (1 + pos * spRet * (1 - cost));
      bh *= (1 + spRet);
      lastPos = pos;
      mode = next.mode;
      
      curve.push({ d:DATES[i], v:eq, b:bh });
    }
    
    BT_RESULT = { curve, tradeLog, switches, final:eq, bhFinal:bh };
    renderUI();
    showLoading(false);
  }, 100);
}

function computeShield(i, cfg) {
  // ERP 因子
  const erp = (100 / CAPE[i]) - TIPS[i];
  const f1 = lerp(erp, 0, 4, 10, 100);
  
  // HY OAS 與 Z-Score
  const hyNow = HY[i] * 100;
  const f5b = lerp(hyNow, 250, 600, 80, 20);
  
  // Z-Score (滾動 24 個月/500天)
  const start = Math.max(0, i - 500);
  const slice = HY.slice(start, i);
  const mean = slice.reduce((a,b)=>a+b, 0) / slice.length;
  const std = Math.sqrt(slice.reduce((a,b)=>a+(b-mean)**2, 0) / slice.length) || 1;
  const z = (HY[i] - mean) / std;
  
  const f5 = Math.max(0, f5b - (z > cfg.hyZ ? 20 : 0));
  return { shield: Math.round(f1*0.5 + f5*0.5), z: z.toFixed(2) };
}

function nextMode(curMode, shield, vNow, vPrev, cfg) {
  const vTrigger = vPrev >= cfg.vix && vNow < vPrev;
  if(shield >= cfg.s100) return { mode:'NORMAL', pos: (shield >= cfg.s150 ? 1.5 : 1.0) };
  if(curMode === 'NORMAL') return { mode:'OBS', pos: 1.0 };
  if(vTrigger) return { mode:'STRIKE', pos: 0.3 };
  return { mode:'RETREAT', pos: 0.0 };
}

function lerp(x, x0, x1, y0, y1) {
  const t = Math.max(0, Math.min(1, (x-x0)/(x1-x0)));
  return y0 + (y1-y0)*t;
}

// ═══════════════════════════════════════════
// 5. UI 渲染 (圖表與數據)
// ═══════════════════════════════════════════
let charts = {};

function renderUI() {
  const r = BT_RESULT;
  const last = r.curve[r.curve.length-1];
  
  // KPI
  document.getElementById('kpiStrip').innerHTML = `
    <div class="kpi"><div class="kpi-label">策略終值</div><div class="kpi-val">${Math.round(last.v).toLocaleString()}</div></div>
    <div class="kpi"><div class="kpi-label">B&H 終值</div><div class="kpi-val" style="color:var(--muted)">${Math.round(last.b).toLocaleString()}</div></div>
    <div class="kpi"><div class="kpi-label">總報酬率</div><div class="kpi-val" style="color:var(--green)">+${((last.v/r.curve[0].v-1)*100).toFixed(1)}%</div></div>
    <div class="kpi"><div class="kpi-label">換檔次數</div><div class="kpi-val">${r.switches}</div></div>
  `;

  // 當前狀態 (Live Bar)
  const lTrade = r.tradeLog[r.tradeLog.length-1] || {shield:50, mode:'NORMAL', pos:1.0, z:0};
  document.getElementById('liveShieldBox').innerHTML = `
    <div class="item"><div class="lbl">盾牌分</div><div class="val" style="color:var(--accent)">${lTrade.shield}</div></div>
    <div class="sep"></div>
    <div class="item"><div class="lbl">狀態</div><div class="val">${lTrade.mode}</div></div>
    <div class="sep"></div>
    <div class="item"><div class="lbl">持倉</div><div class="val" style="color:var(--gold)">${lTrade.pos*100}%</div></div>
    <div class="sep"></div>
    <div class="item"><div class="lbl">最新 Z-Score</div><div class="val">${lTrade.z}σ</div></div>
  `;

  drawNavChart(r.curve);
  renderTradeList(r.tradeLog);
}

function drawNavChart(data) {
  const ctx = document.getElementById('navChart').getContext('2d');
  if(charts.nav) charts.nav.destroy();
  charts.nav = new Chart(ctx, {
    type: 'line',
    data: {
      labels: data.map(d => d.d),
      datasets: [
        { label: '策略淨值', data: data.map(d => d.v), borderColor: '#00e5a0', borderWidth: 2, pointRadius: 0 },
        { label: 'B&H', data: data.map(d => d.b), borderColor: '#3d4a66', borderWidth: 1, pointRadius: 0 }
      ]
    },
    options: { responsive: true, maintainAspectRatio: false, scales: { y: { type: 'logarithmic' } } }
  });
}

function renderTradeList(logs) {
  const body = document.getElementById('trBody');
  body.innerHTML = logs.reverse().slice(0, 50).map(l => `
    <tr>
      <td>${l.d}</td>
      <td>${l.mode}</td>
      <td>${l.pos*100}%</td>
      <td>${l.shield}</td>
      <td>${l.z}</td>
      <td>${l.vix}</td>
      <td class="mono">${l.sp.toFixed(1)}</td>
    </tr>
  `).join('');
}

// UI 輔助
function switchTab(e, name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
}

function showLoading(show) {
  document.getElementById('loadingOverlay').classList.toggle('hidden', !show);
}
</script>

</body>
</html>
