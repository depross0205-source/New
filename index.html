<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>LPPL Pro Engine</title>

<style>
body{background:#111;color:#eee;font-family:Arial;padding:20px}
.card{background:#222;padding:15px;margin:10px 0;border-radius:10px}
button{padding:10px;margin-top:10px}
.big{font-size:24px}
</style>
</head>

<body>

<h2>LPPL 專業風控系統</h2>

<div class="card">
<select id="symbol">
<option value="^GSPC">S&P500</option>
<option value="^TWII">台股</option>
</select>

<button onclick="run()">執行分析</button>
<button onclick="optimize()">一鍵優化</button>
</div>

<div class="card">
<h3>結果</h3>
<div id="output"></div>
</div>

<script>

// ================= Yahoo =================

async function getYahoo(symbol){
  let url=`https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?range=5y&interval=1d`
  let j=await (await fetch(url)).json()
  return j.chart.result[0].indicators.quote[0].close.filter(v=>v)
}

// ================= LPPL =================

function lpplModel(t,A,B,C,m,w,tc,phi){
  let dt = tc - t
  return A + B*Math.pow(dt,m) +
    C*Math.pow(dt,m)*Math.cos(w*Math.log(dt)+phi)
}

// ===== 簡化 Nelder-Mead =====

function fitLPPL(price){

  let best=null

  for(let m=0.2;m<0.9;m+=0.2){
    for(let w=6;w<=12;w+=2){

      let tc = price.length + 30

      let A = Math.log(price.at(-1))
      let B = -1
      let C = 0.1
      let phi = 0

      let err=0

      for(let t=0;t<price.length;t++){
        let pred = lpplModel(t,A,B,C,m,w,tc,phi)
        err += Math.abs(Math.log(price[t])-pred)
      }

      if(!best || err<best.err){
        best={m,w,tc,err}
      }
    }
  }

  return best
}

// ================= Score =================

function lpplScore(fit){

  let days = fit.tc - fit.len

  let s1 = 100*Math.exp(-days/30)
  let s2 = (1-fit.m)*100

  return 0.6*s1 + 0.4*s2
}

// ================= 風險 =================

function ROC(a,n){return a.map((v,i)=>i<n?0:(v-a[i-n])/a[i-n])}

function slope(price){
  let ma20=price.slice(-20).reduce((a,b)=>a+b)/20
  let ma60=price.slice(-60).reduce((a,b)=>a+b)/60
  return ma20<ma60?100:0
}

function accel(price){
  let r20=ROC(price,20).at(-1)
  let r60=ROC(price,60).at(-1)
  return Math.max(0,Math.min(100,(r20-r60)*200))
}

// ================= 回測 =================

function backtest(price,w){

  let hits=0, signals=0, dd=[]

  for(let i=100;i<price.length-20;i++){

    let sub=price.slice(0,i)

    let fit=fitLPPL(sub)

    let score =
      w.lppl*(1-fit.m)*100 +
      w.slope*slope(sub) +
      w.accel*accel(sub)

    if(score>70){

      signals++

      let future=price.slice(i,i+20)
      let min=Math.min(...future)
      let d=(min-price[i])/price[i]*100

      dd.push(d)

      if(d<-5) hits++
    }
  }

  let avg=dd.reduce((a,b)=>a+b,0)/dd.length

  return {
    success:(hits/signals*100)||0,
    avg:avg||0,
    signals
  }
}

// ================= 主 =================

async function run(){

  let price=await getYahoo(symbol.value)

  let res=backtest(price,{
    lppl:0.6,
    slope:0.2,
    accel:0.2
  })

  output.innerHTML=`
  成功率: ${res.success.toFixed(1)}%<br>
  平均跌幅: ${res.avg.toFixed(2)}%<br>
  訊號數: ${res.signals}
  `
}

// ================= 一鍵優化 =================

async function optimize(){

  let price=await getYahoo(symbol.value)

  let best=null

  for(let lp=0.3;lp<=0.8;lp+=0.1){
    for(let sl=0;sl<=0.4;sl+=0.1){

      let ac = 1-lp-sl

      if(ac<0) continue

      let res=backtest(price,{
        lppl:lp,
        slope:sl,
        accel:ac
      })

      let score = res.success * Math.abs(res.avg)

      if(!best || score>best.score){
        best={lp,sl,ac,...res,score}
      }
    }
  }

  output.innerHTML=`
  ⭐最佳組合<br>
  LPPL: ${best.lp.toFixed(2)}<br>
  Slope: ${best.sl.toFixed(2)}<br>
  Accel: ${best.ac.toFixed(2)}<br><br>

  成功率: ${best.success.toFixed(1)}%<br>
  平均跌幅: ${best.avg.toFixed(2)}%
  `
}

</script>

</body>
</html>
