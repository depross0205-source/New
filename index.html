<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>LPPL Risk Engine</title>
<style>
body{
  font-family: Arial;
  background:#111;
  color:#eee;
  padding:20px;
}
button{
  padding:10px;
  margin-top:10px;
}
.card{
  margin-top:20px;
  padding:15px;
  background:#222;
  border-radius:10px;
}
.big{
  font-size:32px;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>LPPL 風險引擎</h2>

<select id="symbol">
  <option value="^GSPC">S&P500</option>
  <option value="^TWII">台股加權</option>
</select>

<br>
<button onclick="run()">執行風險分析</button>

<div class="card">
  <div>Risk Score</div>
  <div id="score" class="big">-</div>

  <div>Exposure</div>
  <div id="exposure" class="big">-</div>

  <div>Regime</div>
  <div id="regime" class="big">-</div>
</div>

<script>

// ================= 工具 =================

function SMA(arr,n){
  return arr.map((_,i)=>{
    if(i<n) return null
    return arr.slice(i-n,i).reduce((a,b)=>a+b,0)/n
  })
}

function ROC(arr,n){
  return arr.map((v,i)=> i<n?0:(v-arr[i-n])/arr[i-n])
}

// ================= Yahoo =================

async function getYahoo(symbol){

  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?range=5y&interval=1d`

  const res = await fetch(url)
  const json = await res.json()

  const r = json.chart.result[0]

  let data = []

  for(let i=0;i<r.timestamp.length;i++){
    data.push(r.indicators.quote[0].close[i])
  }

  return data.filter(v=>v!=null)
}

// ================= LPPL =================

function computeError(price, tc, m, w){

  let err=0

  for(let t=0;t<price.length;t++){
    let dt = tc - t
    if(dt<=0) return Infinity

    let pred = Math.log(price[0]) +
      Math.pow(dt,m)*(1+Math.cos(w*Math.log(dt)))

    err += Math.abs(Math.log(price[t])-pred)
  }

  return err
}

function fitLPPL(price){

  let best=null

  for(let tcShift=10;tcShift<=60;tcShift+=10){

    let tc = price.length + tcShift

    for(let m=0.2;m<0.9;m+=0.2){
      for(let w=6;w<=12;w+=2){

        let e = computeError(price,tc,m,w)

        if(!best || e<best.error){
          best = {tc,m,w,error:e,len:price.length}
        }
      }
    }
  }

  return best
}

function lpplScore(fit){

  let d = fit.tc - fit.len

  let score_tc = 100*Math.exp(-d/30)
  let score_m = (1-fit.m)*100

  return 0.6*score_tc + 0.4*score_m
}

function multiLPPL(price){

  let f = fitLPPL(price.slice(-240))
  return lpplScore(f)
}

// ================= 風險 =================

function slopeRisk(price){

  let ma20=SMA(price,20)
  let ma60=SMA(price,60)

  let s20=ma20.at(-1)-ma20.at(-5)
  let s60=ma60.at(-1)-ma60.at(-5)

  return (s20<0 && s60>0)?100:0
}

function accelRisk(price){

  let acc = ROC(price,20).at(-1) - ROC(price,60).at(-1)
  return Math.max(0,Math.min(100,acc*200))
}

function exposure(score){

  if(score<60) return 1
  if(score<70) return 0.8
  if(score<75) return 0.6
  if(score<80) return 0.4
  if(score<85) return 0.2
  return 0
}

// ================= 主流程 =================

async function run(){

  let symbol = document.getElementById("symbol").value

  document.getElementById("score").innerText = "Loading..."

  let price = await getYahoo(symbol)

  let lppl = multiLPPL(price)
  let slope = slopeRisk(price)
  let accel = accelRisk(price)

  let score = 0.6*lppl + 0.2*slope + 0.2*accel

  let exp = exposure(score)

  let regime =
    score>80?"RISK_OFF":
    score>70?"WARNING":"NORMAL"

  document.getElementById("score").innerText = score.toFixed(1)
  document.getElementById("exposure").innerText = exp
  document.getElementById("regime").innerText = regime
}

</script>

</body>
</html>
